<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartLocal — Initializing</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#04060f;
      --card:#0b1122;
      --neon-blue:#00c8ff;
      --neon-purple:#b84fff;
      --neon-green:#00ff9d;
      --neon-pink:#ff3fa4;
      --neon-gold:#ffd700;
      --text:#d9e2ff;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:radial-gradient(circle at 20% 20%, rgba(0,200,255,0.1), transparent 40%),
                 radial-gradient(circle at 80% 10%, rgba(184,79,255,0.12), transparent 35%),
                 radial-gradient(circle at 60% 80%, rgba(0,255,157,0.08), transparent 35%),
                 var(--bg);
      color:var(--text);
      font-family:'Rajdhani',sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .stage{
      width:min(720px, 92vw);
      background:rgba(11,17,34,0.85);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:2rem 2.5rem;
      box-shadow:0 25px 60px rgba(0,0,0,0.5);
      backdrop-filter:blur(16px);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:1rem;
      margin-bottom:1.2rem;
    }
    .logo{
      width:58px;height:58px;border-radius:18px;
      display:grid;place-items:center;
      font-family:'Orbitron',sans-serif;
      font-weight:900;letter-spacing:1px;
      color:#fff;
      background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));
      transform-style:preserve-3d;
      animation:flip 2.8s infinite ease-in-out;
    }
    .logo span{color:var(--neon-green)}
    @keyframes flip{
      0%{transform:rotateY(0deg)}
      50%{transform:rotateY(180deg)}
      100%{transform:rotateY(360deg)}
    }
    .brand-title{
      font-family:'Orbitron',sans-serif;
      font-weight:800;
      font-size:1.3rem;
      letter-spacing:1.2px;
    }
    .brand-sub{
      color:#a9b8e6;
      font-size:0.9rem;
    }

    .loader-wrap{
      display:flex;
      align-items:center;
      gap:1.5rem;
      margin:1.6rem 0 1rem;
    }
    .spinner{
      width:72px;height:72px;border-radius:50%;
      background:conic-gradient(var(--neon-blue), var(--neon-purple), var(--neon-pink), var(--neon-green), var(--neon-gold), var(--neon-blue));
      mask:radial-gradient(circle at center, transparent 55%, #000 56%);
      animation:spin 1.2s linear infinite;
      box-shadow:0 0 25px rgba(0,200,255,0.35);
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .steps{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:0.5rem;
    }
    .step{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0.55rem 0.8rem;
      border-radius:12px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.06);
      font-size:0.92rem;
    }
    .step.active{
      border-color:rgba(0,200,255,0.5);
      box-shadow:0 0 18px rgba(0,200,255,0.2);
      color:#ffffff;
    }
    .step small{
      color:#94a6d6;
      font-family:'Orbitron',sans-serif;
      letter-spacing:1px;
    }
    .encrypt{
      margin-top:0.8rem;
      padding:0.8rem 1rem;
      border-radius:14px;
      background:rgba(0,0,0,0.35);
      border:1px solid rgba(255,255,255,0.08);
      font-family:'Orbitron',sans-serif;
      letter-spacing:2px;
      font-size:0.85rem;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:0.6rem;
    }
    .encrypt span{color:var(--neon-green)}
    .progress{
      margin-top:1rem;
      height:8px;border-radius:999px;
      background:rgba(255,255,255,0.08);
      overflow:hidden;
    }
    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--neon-blue),var(--neon-purple),var(--neon-green));
      transition:width 0.4s ease;
    }
    .countdown{
      margin-top:0.6rem;
      color:#8fa2d8;
      font-size:0.85rem;
      text-align:right;
    }
    @media (max-width:600px){
      .loader-wrap{flex-direction:column;align-items:flex-start}
      .spinner{width:60px;height:60px}
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="brand">
      <div class="logo"><span>S</span>L</div>
      <div>
        <div class="brand-title">SMARTLOCAL</div>
        <div class="brand-sub">Command Center Initialization</div>
      </div>
    </div>

    <div class="loader-wrap">
      <div class="spinner" aria-hidden="true"></div>
      <div class="steps" id="steps">
        <div class="step active"><span>Syncing core services</span><small>STEP 01</small></div>
        <div class="step"><span>Encrypting data stream</span><small>STEP 02</small></div>
        <div class="step"><span>Loading business modules</span><small>STEP 03</small></div>
        <div class="step"><span>Preparing dashboard</span><small>STEP 04</small></div>
      </div>
    </div>

    <div class="encrypt">
      <div>DATA ENCRYPTED</div>
      <span id="token">000000000000000</span>
    </div>

    <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="countdown" id="countdown">Redirecting in 10s...</div>
  </div>

  <script>
    const steps = Array.from(document.querySelectorAll('.step'));
    const tokenEl = document.getElementById('token');
    const progressBar = document.getElementById('progress-bar');
    const countdown = document.getElementById('countdown');
    let stepIndex = 0;
    let seconds = 10;

    function randomToken() {
      let out = '';
      for (let i = 0; i < 15; i += 1) {
        out += Math.floor(Math.random() * 10);
      }
      return out;
    }

    function rotateSteps() {
      steps.forEach((step, idx) => step.classList.toggle('active', idx === stepIndex));
      stepIndex = (stepIndex + 1) % steps.length;
    }

    function tick() {
      seconds -= 1;
      progressBar.style.width = `${(10 - seconds) * 10}%`;
      countdown.textContent = `Redirecting in ${seconds}s...`;
      if (seconds <= 0) {
        window.location.href = 'index.html';
      }
    }

    tokenEl.textContent = randomToken();
    setInterval(() => { tokenEl.textContent = randomToken(); }, 900);
    setInterval(rotateSteps, 2000);
    const timer = setInterval(tick, 1000);
  </script>
</body>
</html>
