<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050608"/>
      <stop offset="100%" stop-color="#11141d"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#ffe9a6"/>
      <stop offset="100%" stop-color="#c38a18"/>
    </linearGradient>
    <linearGradient id="letters" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#fff6d8"/>
      <stop offset="100%" stop-color="#f1bf46"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="25" fill="none" stroke="url(#ring)" stroke-width="2.6" opacity="0.95"/>
  <circle cx="32" cy="32" r="21" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <g filter="url(#glow)">
    <text x="14" y="41" fill="url(#letters)" font-size="24" font-weight="800" font-family="Arial, Helvetica, sans-serif" letter-spacing="1.2">SL</text>
  </g>
</svg>
